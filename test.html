<!DOCTYPE html>
<html>
<head>
  <title>My AI Chat</title>
  <style>
    body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1f25, #343541);
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}


   #sidebar {
  width: 250px;
  background: #202123;
  padding: 10px;
}

.chat-item {
  padding: 10px;
  margin: 5px 0;
  background: #343541;
  border-radius: 5px;
  cursor: pointer;
}

.chat-item:hover {
  background: #444654;
}

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .message {
  max-width: 70%;
  padding: 10px 15px;
  margin: 10px 0;
  border-radius: 10px;
  animation: fadeIn 0.3s ease-in;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

    .user {
      background: #10a37f;
      align-self: flex-end;
    }

    .bot {
      background: #444654;
      align-self: flex-start;
    }

    #inputArea {
      display: flex;
      padding: 15px;
      background: #40414f;
    }

    #input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  background: #10a37f;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #0e8c6d;
  transform: scale(1.05);
}
    #welcome {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0.8;
    }

    #welcome h1 {
      margin: 0;
      font-size: 28px;
    }

    #welcome p {
      margin-top: 10px;
      font-size: 16px;
      color: #ccc;
    }
  </style>
</head>

<body>

<div id="welcome">
  <h1>Welcome to My AI 🤖</h1>
  <p>Ask anything to get started</p>
</div>

<div style="display: flex; height: 100vh;">

  <div id="sidebar">
    <button onclick="newChat()">+ New Chat</button>
    <div id="chatList"></div>
  </div>

  <div style="flex: 1; display: flex; flex-direction: column;">

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Type a message..." />
  <button onclick="send()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

<script>
let chatHistory = JSON.parse(localStorage.getItem("chat")) || [];
let firstMessage = true;
let useVoice = false; // 🔥 ADD THIS

async function send() {
    window.speechSynthesis.cancel();
  const input = document.getElementById("input");
  const message = input.value;
  if (!message.trim()) return;

  if (firstMessage) {
    document.getElementById("welcome").style.display = "none";
    firstMessage = false;
  }

  addMessage(message, "user");
  input.value = "";

  const typingMsg = addMessage("Thinking... ⏳", "bot");

  try {
    const apiMessages = chatHistory.map(m => ({
  role: m.sender === "user" ? "user" : "assistant",
  content: m.text
}));

const res = await fetch("https://my-ai-chat-gi9h.onrender.com/chat", {
  method: "POST",
  headers: {"Content-Type": "application/json"},
  body: JSON.stringify({ messages: apiMessages }),
});

const data = await res.json();
const reply = data.reply || "No reply";

typingMsg.innerText = reply;


if (useVoice) {
  speak(reply); // 🔊 only if voice used
  useVoice = false; // reset after speaking
}

  } catch (error) {
    typingMsg.innerText = "Server error 😢 (maybe waking up)";
  }
}

function addMessage(text, sender) {
    
  localStorage.setItem("chat", JSON.stringify(chatHistory));
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerText = text;

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  saveChats();
renderChatList();
  return msg; // 🔥 VERY IMPORTANT
}

function startVoice() {
  useVoice = true; // 🔥 user is using voice

  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    document.getElementById("input").value =
      event.results[0][0].transcript;
  };

  recognition.start();
}

function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  speech.rate = 0.95;
  speech.pitch = 1.1;

  const voices = window.speechSynthesis.getVoices();
  speech.voice = voices.find(v => v.lang === "en-US") || voices[0];

  window.speechSynthesis.speak(speech);
}
// 📂 CHAT SYSTEM (ADD HERE)

let allChats = JSON.parse(localStorage.getItem("allChats")) || {};
let currentChatId = "default";

function newChat() {
  currentChatId = Date.now().toString();
  chatHistory = [];
  document.getElementById("chat").innerHTML = "";
  saveChats();
  renderChatList();
}

function saveChats() {
  allChats[currentChatId] = chatHistory;
  localStorage.setItem("allChats", JSON.stringify(allChats));
}

function loadChat(id) {
  currentChatId = id;
  chatHistory = allChats[id] || [];
  document.getElementById("chat").innerHTML = "";

  chatHistory.forEach(m => addMessage(m.text, m.sender));
}

function renderChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  Object.keys(allChats).forEach(id => {
    const item = document.createElement("div");
    item.classList.add("chat-item");
    item.innerText = "Chat " + id.slice(-4);

    item.onclick = () => loadChat(id);

    list.appendChild(item);
  });
}


document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    send();
  }
});

window.onload = () => {
  const chat = document.getElementById("chat");

  chat.innerHTML = "";

  // load current chat messages
  chatHistory.forEach(m => {
    const msg = document.createElement("div");
    msg.classList.add("message", m.sender);
    msg.innerText = m.text;
    chat.appendChild(msg);
  });

  // hide welcome if chat exists
  if (chatHistory.length > 0) {
    document.getElementById("welcome").style.display = "none";
    firstMessage = false;
  }

  // load sidebar chats
  renderChatList();

  // focus input
  document.getElementById("input").focus();
};



</script>
</div>
</div>
</body>
</html>
